{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>

    <link rel="stylesheet" href="{% static 'css/account-styling/password-reset-confirm.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" href="{% static 'images/shopping-cart.png' %}">
</head>
<body>
<div class="reset-password-form">

    <form method="POST">
        {% csrf_token %}

        <h1>Reset Your Password</h1>
        <div class="password-box-1">
            <label for="passowrd1">New Password</label>
            <input type="password" name="new_password1" id="new_password1" placeholder="Enter your new password">
            <p> <span><ion-icon name="alert-outline"></ion-icon></span> Must be at least 8 characters </p>
        </div>
        <div class="password-box-2">
            <label for="password2">Confirm Password</label>
            <input type="password" name="new_password2" id="new_password2" placeholder="Confirm password">
            <p> <span><ion-icon name="alert-outline"></ion-icon></span> Both Password should match</p>
        </div>

        <div class="submit-or-cancel">
            <a href="{% url 'signin' %}">Cancel</a>
            <button type="submit">Reset Password &rarr;</button>
        </div>
    </form>

</div>
</body>
</html>
