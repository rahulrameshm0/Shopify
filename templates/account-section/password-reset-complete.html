{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <link rel="icon" href="{% static 'images/shopping-cart.png' %}">
    <link rel="stylesheet" href="{% static 'css/account-styling/reset-complete.css' %}">
</head>
<body>
    <div class="card">
        <div class="icon-circle">✅</div>
        <h2 style="font-size: 22px; font-weight: 500; margin-bottom: 8px;">Password reset!</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 2rem; line-height: 1.6;">
            Your password has been changed successfully.
            You can now log in with your new password.
        </p>
        <div class="security-box">
            <div class="security-icon">🔒</div>
            <div>
                <p style="font-size: 13px; font-weight: 500; margin-bottom: 2px;">Your account is secure</p>
                <p style="font-size: 12px; color: #999;">All other sessions have been logged out</p>
            </div>
        </div>
        <a href="{% url 'signin' %}" class="login-btn">Back to login</a>
    </div>
</body>
</html>
